<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI内容创作系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #7209b7;
            --secondary-color: #560bad;
            --accent-color: #f72585;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; color: var(--primary-color) !important; }
        .hero-section { 
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); 
            color: white; padding: 80px 0; 
        }
        .feature-card { border: none; border-radius: 15px; transition: transform 0.3s; height: 100%; }
        .feature-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .feature-icon { font-size: 2.5rem; color: var(--primary-color); }
        .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); }
        .btn-primary:hover { background-color: var(--secondary-color); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-pencil"></i> AI内容创作系统</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/topic-brainstorm">选题脑暴</a></li>
                    <li class="nav-item"><a class="nav-link" href="/viral-analysis">爆款拆解</a></li>
                    <li class="nav-item"><a class="nav-link" href="/platform-adaptation">多平台适配</a></li>
                    <li class="nav-item"><a class="nav-link" href="/title-ab-test">标题AB测试</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">关于</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>{% block content %}{% endblock %}</main>

    <footer style="background-color: #333; color: white; padding: 40px 0; margin-top: 80px;">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5><i class="bi bi-pencil"></i> AI内容创作系统</h5>
                    <p>基于WorkBuddy能力构建的内容创作辅助工具</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p>© 2024 AI黑客松参赛作品</p>
                    <p>方向二【内容】内容创作系统</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
