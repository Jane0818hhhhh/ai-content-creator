{% extends "base.html" %}

{% block title %}AI内容创作系统 - 首页{% endblock %}

{% block content %}
<section class="hero-section">
    <div class="container">
        <div class="row align-items-center">

                <p class="lead mb-4">帮助个人创作者提升内容生产效率、优化多平台发布策略</p>
                <div class="d-flex gap-3">

            </div>

    </div>
</section>

<section class="py-5">

            <div class="col-md-4">

            </div>
            <div class="col-md-4">

                </div>
            </div>
            <div class="col-md-4">

                        <a href="/platform-adaptation" class="btn btn-primary">立即使用</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card feature-card">

                        <div class="feature-icon"><i class="bi bi-type"></i></div>

                        <a href="/title-ab-test" class="btn btn-primary">立即使用</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
