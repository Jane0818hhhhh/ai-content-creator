{% extends "base.html" %}

{% block title %}选题脑暴 - AI内容创作系统{% endblock %}

{% block content %}
<section class="hero-section">
    <div class="container">
        <h1 class="display-5 fw-bold">选题脑暴</h1>
        <p class="lead">输入领域或关键词，生成多个选题角度</p>
    </div>
</section>

<div class="container">
    <div class="row">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">输入创作主题</h5>
                    <div class="mb-3">
                        <label class="form-label">领域/关键词</label>
                        <input type="text" class="form-control" id="topic" placeholder="例如：AI工具、编程学习">
                    </div>
                    <button class="btn btn-primary w-100" onclick="brainstorm()">
                        <i class="bi bi-lightbulb"></i> 生成选题
                    </button>
                </div>
            </div>
        </div>
        
        <div class="col-lg-8">
            <div id="loading" style="display: none;" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-3">正在生成选题...</p>
            </div>
            
            <div id="result" style="display: none;">
                <h4>选题建议</h4>
                <div id="ideasList"></div>
            </div>
            
            <div id="emptyState" class="text-center py-5">
                <i class="bi bi-lightbulb" style="font-size: 3rem; color: #ccc;"></i>
                <p class="mt-3 text-muted">输入主题生成选题</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function brainstorm() {
    const topic = document.getElementById('topic').value.trim();
    if (!topic) { alert('请输入主题'); return; }
    
    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    
    fetch('/api/topic-brainstorm', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({topic: topic})
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('loading').style.display = 'none';
        if (data.success) {
            displayResult(data.data);
        } else {
            alert('生成失败');
        }
    })
    .catch(e => {
        document.getElementById('loading').style.display = 'none';
        alert('错误：' + e);
    });
}

function displayResult(data) {
    const list = document.getElementById('ideasList');
    list.innerHTML = '';
    
    data.ideas.forEach((idea, idx) => {
        const card = document.createElement('div');
        card.className = 'card mb-3';
        card.innerHTML = `
            <div class="card-body">
                <h5 class="card-title">${idx + 1}. ${idea.title}</h5>
                <p class="card-text">
                    <span class="badge bg-primary">${idea.angle}</span>
                    <span class="badge bg-secondary">${idea.platform}</span>
                    <span class="badge bg-success">热度：${idea.heat_score}</span>
                </p>
                <p class="card-text text-muted">${idea.reason}</p>
            </div>
        `;
        list.appendChild(card);
    });
    
    document.getElementById('result').style.display = 'block';
}
</script>
{% endblock %}
