{% extends "base.html" %}
{% block title %}爆款拆解{% endblock %}
{% block content %}
<div class="module-header">
    <div class="container">
        <h2><i class="bi bi-fire"></i> 爆款拆解</h2>
        <p class="mb-0 opacity-75">粘贴一篇爆款文本，AI 拆结构、找情绪节点、给出可复用框架</p>
    </div>
</div>
<div class="container">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card">
                <div class="card-body">
                    <ul class="nav nav-tabs mb-3">
                        <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-paste">粘贴文本</a></li>
                        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-file">从素材库</a></li>
                    </ul>
                    <div class="tab-content">
                        <div class="tab-pane active" id="tab-paste">
                            <textarea class="form-control" id="content" rows="12" placeholder="粘贴爆款正文…"></textarea>
                        </div>
                        <div class="tab-pane" id="tab-file">
                            <div id="doc-list">加载中…</div>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100 mt-3" id="btn-go"><i class="bi bi-graph-up-arrow"></i> 开始拆解</button>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div id="result" class="d-none">
                <div class="card result-card">
                    <div class="card-body">
                        <h5>📊 拆解结果 <span class="source-tag" id="r-source"></span></h5>

                        <h6 class="mt-3">🎯 全文结构</h6>
                        <p class="badge bg-light text-dark p-2" id="r-struct"></p>

                        <h6 class="mt-3">💥 为什么爆</h6>
                        <div class="alert alert-warning" id="r-why"></div>

                        <div class="row g-3 mt-1">
                            <div class="col-md-6"><h6>📌 标题技巧</h6><ul id="r-titletips" class="small"></ul></div>
                            <div class="col-md-6"><h6>😢 情绪节点</h6><ul id="r-emotion" class="small"></ul></div>
                        </div>

                        <h6>🧩 可复用框架</h6>
                        <div class="alert alert-primary" id="r-framework"></div>

                        <h6>💡 下次自己写的建议</h6>
                        <ul id="r-sugs"></ul>
                    </div>
                </div>
            </div>
            <div id="empty" class="text-center text-muted py-5">
                <div style="font-size:4rem;">🔥</div>
                <p>粘贴爆款文本，看 AI 怎么拆解</p>
            </div>
        </div>
    </div>
</div>

<script>
let selectedDocId = null;
async function loadDocs() {
    const r = await fetch('/api/library/list').then(r => r.json());
    const box = document.getElementById('doc-list');
    if (!r.docs.length) { box.innerHTML = '<p class="small text-muted">素材库为空，先去 <a href="/library">上传</a></p>'; return; }
    box.innerHTML = r.docs.map(d => `
        <div class="form-check">
            <input class="form-check-input" type="radio" name="doc" id="d${d.id}" value="${d.id}">
            <label class="form-check-label" for="d${d.id}">${d.filename} <span class="badge bg-secondary">${d.category}</span></label>
        </div>`).join('');
    box.querySelectorAll('input').forEach(el => el.onchange = e => selectedDocId = e.target.value);
}
loadDocs();

document.getElementById('btn-go').onclick = async () => {
    const activeTab = document.querySelector('.tab-pane.active').id;
    const body = {};
    if (activeTab === 'tab-paste') {
        body.content = document.getElementById('content').value.trim();
        if (!body.content) { alert('请粘贴文本'); return; }
    } else {
        if (!selectedDocId) { alert('请选文档'); return; }
        body.doc_id = selectedDocId;
    }
    const btn = document.getElementById('btn-go');
    btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span> 拆解中…';
    try {
        const r = await fetch('/api/viral', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)}).then(r => r.json());
        if (!r.success) { alert(r.error); btn.disabled = false; btn.innerHTML = '<i class="bi bi-graph-up-arrow"></i> 开始拆解'; return; }
        document.getElementById('empty').classList.add('d-none');
        document.getElementById('result').classList.remove('d-none');
        const d = r.data || {};
        const tag = document.getElementById('r-source');
        tag.className = 'source-tag ' + r.source;
        tag.textContent = r.source === 'real' ? '真实 AI' : 'Mock';
        document.getElementById('r-struct').textContent = safeText(d.structure) || '-';
        document.getElementById('r-why').textContent = safeText(d.why_viral) || '-';
        document.getElementById('r-titletips').innerHTML = (d.title_tips || []).map(x => `<li>${safeText(x)}</li>`).join('') || '<li class="text-muted">-</li>';
        document.getElementById('r-emotion').innerHTML = (d.emotion_nodes || []).map(x => `<li>${safeText(x)}</li>`).join('') || '<li class="text-muted">-</li>';
        document.getElementById('r-framework').textContent = safeText(d.framework) || '-';
        document.getElementById('r-sugs').innerHTML = (d.suggestions || []).map(x => `<li>${safeText(x)}</li>`).join('') || '<li class="text-muted">-</li>';
    } catch (e) { alert('失败：' + e); }
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-graph-up-arrow"></i> 开始拆解';
};
</script>
{% endblock %}
